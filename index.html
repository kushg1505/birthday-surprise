<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Something Lovely Awaits ✨</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="sparkles" id="sparkles"></div>
<div class="confetti" id="confetti"></div>

<!-- Left side balloons -->
<div class="balloon-wrap" style="left:3%; bottom:15%;">
  <div class="balloon blue large"></div>
  <div class="balloon-string"></div>
</div>

<div class="balloon-wrap" style="left:8%; bottom:30%;">
  <div class="balloon blue medium"></div>
  <div class="balloon-string"></div>
</div>

<div class="balloon-wrap" style="left:1%; bottom:55%;">
  <div class="balloon blue small"></div>
  <div class="balloon-string"></div>
</div>

<div class="balloon-wrap" style="left:12%; bottom:60%;">
  <div class="balloon pink small"></div>
  <div class="balloon-string"></div>
</div>

<div class="balloon-wrap" style="left:5%; bottom:75%;">
  <div class="balloon blue medium"></div>
  <div class="balloon-string"></div>
</div>

<div class="balloon-wrap" style="left:15%; bottom:45%;">
  <div class="balloon pink medium"></div>
  <div class="balloon-string"></div>
</div>

<!-- Right side balloon cluster -->
<div class="balloon-cluster">
  <div class="balloon-wrap cluster-item" style="right:2%; top:5%;">
    <div class="balloon blue large"></div>
    <div class="balloon-string long"></div>
  </div>
  <div class="balloon-wrap cluster-item" style="right:8%; top:2%;">
    <div class="balloon blue medium"></div>
    <div class="balloon-string long"></div>
  </div>
  <div class="balloon-wrap cluster-item" style="right:5%; top:12%;">
    <div class="balloon pink medium"></div>
    <div class="balloon-string long"></div>
  </div>
  <div class="balloon-wrap cluster-item" style="right:12%; top:8%;">
    <div class="balloon blue small"></div>
    <div class="balloon-string"></div>
  </div>
  <div class="balloon-wrap cluster-item" style="right:0%; top:15%;">
    <div class="balloon pink large"></div>
    <div class="balloon-string long"></div>
  </div>
  <div class="balloon-wrap cluster-item" style="right:10%; top:18%;">
    <div class="balloon confetti-balloon medium"></div>
    <div class="balloon-string"></div>
  </div>
  <div class="balloon-wrap cluster-item" style="right:6%; top:25%;">
    <div class="balloon blue small"></div>
    <div class="balloon-string"></div>
  </div>
  <div class="star-balloon" style="right:4%; top:10%;">★</div>
</div>

<!-- Right bottom balloons -->
<div class="balloon-wrap" style="right:3%; bottom:20%;">
  <div class="balloon pink medium"></div>
  <div class="balloon-string"></div>
</div>
<div class="balloon-wrap" style="right:10%; bottom:10%;">
  <div class="balloon blue small"></div>
  <div class="balloon-string"></div>
</div>

<!-- Clouds -->
<div class="cloud cloud-left"></div>
<div class="cloud cloud-right"></div>
<div class="cloud cloud-center"></div>

<!-- Main Card -->
<div class="card">

  <h1>
    <span class="text-blue">Something </span>
    <span class="text-pink">Lovely</span>
    <span class="text-blue"> Awaits </span>
    <span class="sparkle-emoji">✨</span>
  </h1>

  <div class="heart-divider">♥</div>

  <p class="subtitle">
    Waiting for a day that matters more than it should.
  </p>

  <div class="countdown">

    <div class="box box-blue">
      <span id="days">07</span>
      <small>Days</small>
    </div>

    <div class="colon">:</div>

    <div class="box box-pink">
      <span id="hours">14</span>
      <small>Hours</small>
    </div>

    <div class="colon">:</div>

    <div class="box box-blue">
      <span id="minutes">22</span>
      <small>Minutes</small>
    </div>

    <div class="colon">:</div>

    <div class="box box-pink">
      <span id="seconds">09</span>
      <small>Seconds</small>
    </div>

  </div>

  <button class="lock-btn">
    <span class="lock-icon">🔒</span> Opens on 15 May
  </button>

  <p class="footer">
    <span class="footer-heart">♥</span>
    A little surprise for someone special
    <span class="footer-heart">♥</span>
  </p>

</div>

<script src="script.js"></script>

</body>
</html>
