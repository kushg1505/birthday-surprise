<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Something Lovely Awaits ✨</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="confetti" id="confetti"></div>

<!-- Stars scattered in background -->
<img src="Gemini_Generated_Image_z3mu1mz3mu1mz3mu.png" class="star star-1" alt="">
<img src="Gemini_Generated_Image_z3mu1mz3mu1mz3mu.png" class="star star-2" alt="">
<img src="Gemini_Generated_Image_z3mu1mz3mu1mz3mu.png" class="star star-3" alt="">
<img src="Gemini_Generated_Image_z3mu1mz3mu1mz3mu.png" class="star star-4" alt="">
<img src="Gemini_Generated_Image_z3mu1mz3mu1mz3mu.png" class="star star-5" alt="">

<!-- Left side balloons -->
<img src="Gemini_Generated_Image_tw2tuatw2tuatw2t.png" class="balloon-img b-left-1" alt="">
<img src="Gemini_Generated_Image_qri55tqri55tqri5.png" class="balloon-img b-left-2" alt="">
<img src="Gemini_Generated_Image_tw2tuatw2tuatw2t.png" class="balloon-img b-left-3" alt="">
<img src="Gemini_Generated_Image_qri55tqri55tqri5.png" class="balloon-img b-left-4" alt="">
<img src="Gemini_Generated_Image_tw2tuatw2tuatw2t.png" class="balloon-img b-left-5" alt="">

<!-- Right side balloon cluster -->
<img src="Gemini_Generated_Image_krzumjkrzumjkrzu.png" class="balloon-cluster" alt="">

<!-- Right side individual balloons -->
<img src="Gemini_Generated_Image_qri55tqri55tqri5.png" class="balloon-img b-right-1" alt="">
<img src="Gemini_Generated_Image_tw2tuatw2tuatw2t.png" class="balloon-img b-right-2" alt="">

<!-- Clouds bottom -->
<img src="Gemini_Generated_Image_cpkeincpkeincpke.png" class="cloud cloud-left" alt="">
<img src="Gemini_Generated_Image_cpkeincpkeincpke.png" class="cloud cloud-right" alt="">

<!-- Main Card -->
<div class="card">

  <h1>
    <span class="text-blue">Something </span><span class="text-pink">Lovely</span><span class="text-blue"> Awaits </span><span class="sparkle-emoji">✨</span>
  </h1>

  <div class="heart-divider">♥</div>

  <p class="subtitle">
    Waiting for a day that matters more than it should.
  </p>

  <div class="countdown">

    <div class="box box-blue">
      <span id="days">07</span>
      <small>Days</small>
    </div>

    <div class="colon">:</div>

    <div class="box box-pink">
      <span id="hours">14</span>
      <small>Hours</small>
    </div>

    <div class="colon">:</div>

    <div class="box box-blue">
      <span id="minutes">22</span>
      <small>Minutes</small>
    </div>

    <div class="colon">:</div>

    <div class="box box-pink">
      <span id="seconds">09</span>
      <small>Seconds</small>
    </div>

  </div>

  <button class="lock-btn">
    <span class="lock-icon">🔒</span> Opens on 15 May
  </button>

  <p class="footer">
    <span class="footer-heart">♥</span>
    A little surprise for someone special
    <span class="footer-heart">♥</span>
  </p>

</div>

<script src="script.js"></script>

</body>
</html>
