<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Something Lovely Awaits ✨</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="confetti" id="confetti"></div>

<div class="card">

  <h1>
    <span class="text-blue">Something </span><span class="text-pink">Lovely</span><span class="text-blue"> Awaits </span><span class="sparkle-emoji">✨</span>
  </h1>

  <div class="heart-divider">♥</div>

  <p class="subtitle">Waiting for a day that matters more than it should.</p>

  <div class="countdown">

    <div class="box box-blue">
      <span id="days">07</span>
      <small>Days</small>
    </div>

    <div class="colon">:</div>

    <div class="box box-pink">
      <span id="hours">14</span>
      <small>Hours</small>
    </div>

    <div class="colon">:</div>

    <div class="box box-blue">
      <span id="minutes">22</span>
      <small>Minutes</small>
    </div>

    <div class="colon">:</div>

    <div class="box box-pink">
      <span id="seconds">09</span>
      <small>Seconds</small>
    </div>

  </div>

  <button class="uiverse">
    <div class="wrapper">
      <span>🔒 Opens on 15 May</span>
      <div class="circle circle-1"></div>
      <div class="circle circle-2"></div>
      <div class="circle circle-3"></div>
      <div class="circle circle-4"></div>
      <div class="circle circle-5"></div>
      <div class="circle circle-6"></div>
      <div class="circle circle-7"></div>
      <div class="circle circle-8"></div>
      <div class="circle circle-9"></div>
      <div class="circle circle-10"></div>
      <div class="circle circle-11"></div>
      <div class="circle circle-12"></div>
    </div>
  </button>

  <p class="footer">
    <span class="footer-heart">♥</span>
    A little surprise for someone special
    <span class="footer-heart">♥</span>
  </p>

</div>

<script src="script.js"></script>

</body>
</html>
