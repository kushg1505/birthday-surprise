<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Something Lovely Awaits ✨</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="stars"></div>

<div class="balloon balloon1"></div>
<div class="balloon balloon2"></div>
<div class="balloon balloon3"></div>

<div class="cluster">
🎈🎈🎈🎈✨
</div>

<div class="cloud left"></div>
<div class="cloud right"></div>

<div class="card">

<h1>
<span class="blue">Something</span>
<span class="pink">Lovely</span>
<span class="blue">Awaits ✨</span>
</h1>

<p class="subtitle">
Waiting for a day that matters more than it should.
</p>

<div class="countdown">

<div class="box">
<span id="days">07</span>
<small>Days</small>
</div>

<div class="colon">:</div>

<div class="box">
<span id="hours">14</span>
<small>Hours</small>
</div>

<div class="colon">:</div>

<div class="box">
<span id="minutes">22</span>
<small>Minutes</small>
</div>

<div class="colon">:</div>

<div class="box">
<span id="seconds">09</span>
<small>Seconds</small>
</div>

</div>

<button class="lockBtn">🔒 Opens on 15 May</button>

<p class="footer">
A little surprise for someone special
</p>

</div>

<script src="script.js"></script>

</body>
</html>
